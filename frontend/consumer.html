<!DOCTYPE html>
<html>
<head>
  <title>Consumer Verification</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h2>Product Verification</h2>

    <input type="text" id="verifyId" placeholder="Enter Product ID">
    <button onclick="startScan()">Scan QR Code</button>

<div id="reader" style="width:300px; margin:20px auto;"></div>

    <button onclick="verifyProduct()">Verify Product</button>


    <div id="result"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/ethers@6.10.0/dist/ethers.umd.min.js"></script>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>


  <script src="app.js"></script>

</body>
</html>
